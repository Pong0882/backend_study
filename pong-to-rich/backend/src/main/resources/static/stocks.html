<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 시세 — Pong to Rich</title>
  <!-- TradingView Lightweight Charts v4 (캔들차트 라이브러리) -->
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1e2a3a;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 960px;
      margin: 0 auto 32px;
    }

    .back-btn {
      color: #a0b0c0;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-btn:hover { color: #fff; }

    h1 { font-size: 1.6rem; font-weight: 700; }

    /* ── 현재가 카드 ── */
    .stock-card {
      max-width: 960px;
      margin: 0 auto 24px;
      background: #263445;
      border-radius: 12px;
      padding: 24px;
    }

    .stock-name  { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .stock-code  { font-size: 0.85rem; color: #a0b0c0; }

    .current-price {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 12px;
    }

    .change-up   { color: #e74c3c; }
    .change-down { color: #3498db; }
    .change-flat { color: #a0b0c0; }

    .price-detail {
      display: flex;
      gap: 24px;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #a0b0c0;
    }

    /* ── 차트 영역 ── */
    .chart-wrap {
      max-width: 960px;
      margin: 0 auto 24px;
      background: #263445;
      border-radius: 12px;
      overflow: hidden;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #2c3e50;
    }

    .chart-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #a0b0c0;
    }

    /* 차트 툴팁 — hover 시 OHLCV 표시 */
    .chart-tooltip {
      font-size: 0.82rem;
      color: #c8d8e8;
      min-height: 1.2em;
    }

    #candleChart  { width: 100%; height: 360px; }
    #volumeChart  { width: 100%; height: 100px; border-top: 1px solid #2c3e50; }

    /* ── 일봉 테이블 ── */
    .table-wrap {
      max-width: 960px;
      margin: 0 auto;
      background: #263445;
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      padding: 16px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      border-bottom: 1px solid #2c3e50;
      color: #a0b0c0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      padding: 12px 16px;
      text-align: right;
      color: #a0b0c0;
      font-weight: 500;
      border-bottom: 1px solid #2c3e50;
    }

    thead th:first-child { text-align: left; }

    tbody tr:hover { background: #2c3e50; }

    tbody td {
      padding: 10px 16px;
      text-align: right;
      border-bottom: 1px solid #1e2a3a;
    }

    tbody td:first-child { text-align: left; color: #a0b0c0; }

    .loading { text-align: center; padding: 48px; color: #a0b0c0; }
    .error   { text-align: center; padding: 48px; color: #e74c3c; }
  </style>
</head>
<body>

  <div class="header">
    <a href="/" class="back-btn">← 홈으로</a>
    <h1>주식 시세</h1>
  </div>

  <!-- 현재가 카드 -->
  <div class="stock-card" id="currentCard">
    <div class="loading">현재가 불러오는 중...</div>
  </div>

  <!-- 캔들차트 + 거래량 차트 -->
  <div class="chart-wrap">
    <div class="chart-header">
      <span class="chart-title">캔들차트 (삼성전자 · 005930)</span>
      <span class="chart-tooltip" id="chartTooltip"></span>
    </div>
    <div id="candleChart"></div>
    <div id="volumeChart"></div>
  </div>

  <!-- 일봉 테이블 -->
  <div class="table-wrap">
    <div class="table-header">일봉 데이터 (삼성전자 · 005930)</div>
    <div id="tableArea">
      <div class="loading">데이터 불러오는 중...</div>
    </div>
  </div>

  <script>
    const STOCK_CODE = '005930';

    // 숫자 포맷 (1000 → 1,000)
    const fmt = n => Number(n).toLocaleString('ko-KR');

    // 전일 대비 부호 → 클래스 / 텍스트
    function changeInfo(sign, amount, rate) {
      const cls   = sign === '2' || sign === '1' ? 'change-up'
                  : sign === '4' || sign === '5' ? 'change-down'
                  : 'change-flat';
      const arrow = sign === '2' || sign === '1' ? '▲'
                  : sign === '4' || sign === '5' ? '▼' : '-';
      return { cls, text: `${arrow} ${fmt(Math.abs(amount))} (${rate}%)` };
    }

    // ── 캔들차트 초기화 ──────────────────────────────────────────
    // 캔들차트와 거래량 차트를 별도 컨테이너에 생성한 뒤
    // crosshair 이동 시 툴팁에 OHLCV를 실시간으로 표시한다.
    function initCharts(list) {
      // API 응답은 최신순(내림차순)이므로 오름차순으로 반전
      const sorted = [...list].reverse();

      // lightweight-charts는 time을 'YYYY-MM-DD' 문자열로 받는다
      const candleData = sorted.map(d => ({
        time:  String(d.tradeDate),        // LocalDate → "2024-01-02"
        open:  d.openPrice,
        high:  d.highPrice,
        low:   d.lowPrice,
        close: d.closePrice,
      }));

      const volumeData = sorted.map(d => ({
        time:  String(d.tradeDate),
        value: d.volume,
        // 양봉(종가 >= 시가)은 상승색, 음봉은 하락색
        color: d.closePrice >= d.openPrice ? 'rgba(231,76,60,0.5)' : 'rgba(52,152,219,0.5)',
      }));

      // ── 공통 차트 옵션 ────────────────────────────────────────
      const commonOpts = {
        layout: {
          background: { color: '#263445' },
          textColor:  '#a0b0c0',
        },
        grid: {
          vertLines:  { color: '#2c3e50' },
          horzLines:  { color: '#2c3e50' },
        },
        crosshair: {
          mode: LightweightCharts.CrosshairMode.Normal,
        },
        timeScale: {
          borderColor:    '#2c3e50',
          timeVisible:    true,
          secondsVisible: false,
        },
        rightPriceScale: { borderColor: '#2c3e50' },
        handleScroll:    { mouseWheel: true, pressedMouseMove: true },
        handleScale:     { mouseWheel: true, pinch: true },
      };

      // ── 캔들차트 ─────────────────────────────────────────────
      const candleEl = document.getElementById('candleChart');
      const candleChart = LightweightCharts.createChart(candleEl, {
        ...commonOpts,
        width:  candleEl.offsetWidth,
        height: 360,
      });

      const candleSeries = candleChart.addCandlestickSeries({
        upColor:        '#e74c3c',   // 양봉 몸통 (한국: 빨강)
        downColor:      '#3498db',   // 음봉 몸통 (한국: 파랑)
        borderUpColor:   '#e74c3c',
        borderDownColor: '#3498db',
        wickUpColor:     '#e74c3c',
        wickDownColor:   '#3498db',
      });
      candleSeries.setData(candleData);

      // ── 거래량 차트 ──────────────────────────────────────────
      const volumeEl = document.getElementById('volumeChart');
      const volumeChart = LightweightCharts.createChart(volumeEl, {
        ...commonOpts,
        width:  volumeEl.offsetWidth,
        height: 100,
        // 거래량 차트는 날짜 축을 숨긴다 (캔들과 겹침 방지)
        timeScale: { ...commonOpts.timeScale, visible: false },
      });

      const volumeSeries = volumeChart.addHistogramSeries({
        priceFormat:     { type: 'volume' },
        priceScaleId:    '',
        scaleMargins:    { top: 0.1, bottom: 0 },
      });
      volumeSeries.setData(volumeData);

      // ── 두 차트의 timeScale 동기화 ───────────────────────────
      // 캔들에서 스크롤/줌 하면 거래량도 같이 움직인다
      candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) volumeChart.timeScale().setVisibleLogicalRange(range);
      });
      volumeChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) candleChart.timeScale().setVisibleLogicalRange(range);
      });

      // ── crosshair 동기화 + 툴팁 ─────────────────────────────
      const tooltip = document.getElementById('chartTooltip');

      candleChart.subscribeCrosshairMove(param => {
        if (!param || !param.time) {
          tooltip.textContent = '';
          return;
        }
        const c = param.seriesData.get(candleSeries);
        const v = volumeData.find(d => d.time === param.time);
        if (c) {
          const diff  = c.close - c.open;
          const cls   = diff >= 0 ? '#e74c3c' : '#3498db';
          const arrow = diff >= 0 ? '▲' : '▼';
          tooltip.innerHTML =
            `<span style="color:#c8d8e8">${param.time}</span> &nbsp;
             시 <b>${fmt(c.open)}</b> &nbsp;
             고 <b style="color:#e74c3c">${fmt(c.high)}</b> &nbsp;
             저 <b style="color:#3498db">${fmt(c.low)}</b> &nbsp;
             종 <b style="color:${cls}">${fmt(c.close)}</b> &nbsp;
             <span style="color:${cls}">${arrow}${fmt(Math.abs(diff))}</span> &nbsp;
             거래량 <b>${v ? fmt(v.value) : '-'}</b>`;

          // 거래량 차트도 같은 시간으로 crosshair 이동
          volumeChart.setCrosshairPosition(v ? v.value : 0, param.time, volumeSeries);
        }
      });

      // ── 창 리사이즈 대응 ─────────────────────────────────────
      window.addEventListener('resize', () => {
        candleChart.applyOptions({ width: candleEl.offsetWidth });
        volumeChart.applyOptions({ width: volumeEl.offsetWidth });
      });

      // 전체 데이터가 보이도록 맞춤
      candleChart.timeScale().fitContent();
    }

    // ── 최신 일봉 데이터로 현재가 카드 구성 ──────────────────────
    function renderCurrentCard(prices) {
      if (!prices || prices.length === 0) {
        document.getElementById('currentCard').innerHTML =
          `<div class="error">현재가 데이터가 없습니다.</div>`;
        return;
      }

      const latest = prices[0];
      const prev   = prices[1];
      const diff   = prev ? latest.closePrice - prev.closePrice : 0;
      const rate   = prev ? ((diff / prev.closePrice) * 100).toFixed(2) : '0.00';
      const cls    = diff > 0 ? 'change-up' : diff < 0 ? 'change-down' : 'change-flat';
      const arrow  = diff > 0 ? '▲' : diff < 0 ? '▼' : '-';

      document.getElementById('currentCard').innerHTML = `
        <div class="stock-name">삼성전자</div>
        <div class="stock-code">${STOCK_CODE} · 기준일: ${latest.tradeDate}</div>
        <div class="current-price">${fmt(latest.closePrice)} <small style="font-size:1rem">원</small></div>
        <div class="price-detail">
          <span class="${cls}">${arrow} ${fmt(Math.abs(diff))} (${rate}%)</span>
          <span>고가 ${fmt(latest.highPrice)}</span>
          <span>저가 ${fmt(latest.lowPrice)}</span>
          <span>거래량 ${fmt(latest.volume)}</span>
        </div>
      `;
    }

    // ── 현재가 API 호출 (한투 실시간) ────────────────────────────
    async function loadCurrentPrice() {
      try {
        const res  = await fetch(`/api/stocks/${STOCK_CODE}`);
        const json = await res.json();
        const d    = json.data;

        if (!d || !d.stck_prpr) return; // 실패 시 일봉 폴백은 loadDailyPrices에서 처리

        const { cls, text } = changeInfo(d.prdy_vrss_sign, d.prdy_vrss, d.prdy_ctrt);

        document.getElementById('currentCard').innerHTML = `
          <div class="stock-name">삼성전자</div>
          <div class="stock-code">${STOCK_CODE} · 실시간</div>
          <div class="current-price ${cls}">${fmt(d.stck_prpr)} <small style="font-size:1rem">원</small></div>
          <div class="price-detail">
            <span class="${cls}">${text}</span>
            <span>고가 ${fmt(d.stck_hgpr)}</span>
            <span>저가 ${fmt(d.stck_lwpr)}</span>
            <span>거래량 ${fmt(d.acml_vol)}</span>
          </div>
        `;
      } catch (e) {
        // 실패 무시 — loadDailyPrices의 폴백이 처리
      }
    }

    // ── 일봉 데이터 API 호출 → 차트 + 테이블 렌더링 ─────────────
    async function loadDailyPrices() {
      try {
        const res  = await fetch(`/api/stocks/${STOCK_CODE}/prices`);
        const json = await res.json();
        const list = json.data;

        if (!list || list.length === 0) {
          document.getElementById('tableArea').innerHTML =
            `<div class="error">저장된 데이터가 없습니다.</div>`;
          renderCurrentCard(null);
          return;
        }

        // 현재가 카드가 아직 로딩 중이면 일봉 폴백
        if (document.getElementById('currentCard').querySelector('.loading')) {
          renderCurrentCard(list);
        }

        // 차트 그리기
        initCharts(list);

        // 테이블 그리기
        const rows = list.map(d => `
          <tr>
            <td>${d.tradeDate}</td>
            <td>${fmt(d.openPrice)}</td>
            <td>${fmt(d.highPrice)}</td>
            <td>${fmt(d.lowPrice)}</td>
            <td>${fmt(d.closePrice)}</td>
            <td>${fmt(d.volume)}</td>
          </tr>
        `).join('');

        document.getElementById('tableArea').innerHTML = `
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>시가</th>
                <th>고가</th>
                <th>저가</th>
                <th>종가</th>
                <th>거래량</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (e) {
        document.getElementById('tableArea').innerHTML =
          `<div class="error">데이터 조회 실패</div>`;
      }
    }

    loadCurrentPrice();
    loadDailyPrices();
  </script>

</body>
</html>
