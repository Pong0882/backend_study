<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong to Rich</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1e2a3a;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    .logo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #a0b0c0;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      background-color: #2ecc71;
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }

    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-primary {
      background-color: #3498db;
      color: #ffffff;
    }

    .btn-secondary {
      background-color: #2c3e50;
      color: #a0b0c0;
      border: 1px solid #3a4a5a;
    }

    .quote {
      margin-top: 48px;
      padding: 24px 32px;
      border-left: 3px solid #3498db;
      text-align: left;
      max-width: 540px;
      margin-left: auto;
      margin-right: auto;
    }

    .quote p {
      font-size: 1rem;
      color: #c0ccd8;
      line-height: 1.8;
      font-style: italic;
    }

    .quote cite {
      display: block;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #5a7a9a;
      font-style: normal;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #4a5a6a;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="Pong to Rich 로고" class="logo">
    <h1>Pong to Rich</h1>
    <p class="subtitle">
      AI 기반 주식 자동매매 플랫폼<br>
      한국투자증권 API 연동 · 실시간 시세 조회 · 자동 매매 전략
    </p>
    <div class="badge">🚧 개발 중</div>
    <div class="links">
      <a href="/stocks.html" class="btn btn-primary">주식 시세 보기</a>
      <a href="/swagger" class="btn btn-secondary">API 문서 (Swagger)</a>
      <a href="https://github.com/Pong0882/Backend-A-to-Z" class="btn btn-secondary">GitHub</a>
    </div>
    <div class="quote">
      <p>"If you don't find a way to make money while you sleep, you will work until you die."</p>
      <cite>— Warren Buffett</cite>
    </div>
    <div class="footer">
      Built with Spring Boot · Docker · Cloudflare Tunnel
    </div>
  </div>
</body>
</html>
