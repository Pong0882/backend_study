spring:
  application:
    name: pong-to-rich

  profiles:
    active: ${SPRING_PROFILE:local}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-do-not-use-in-production}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  swagger-ui:
    path: /swagger    # 접속 경로
  api-docs:
    path: /api-docs            # JSON 스펙 경로

