springdoc:
  server-url: ${SPRINGDOC_SERVER_URL:https://api.pongtrader.pro}

logging:
  level:
    com.zaxxer.hikari: DEBUG  # HikariCP 커넥션풀 상세 로그 (커넥션 고갈 확인용)

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: pong-to-rich
    distribution:
      percentiles-histogram:
        http.server.requests: true  # P95/P99 계산용 histogram 활성화

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: redis  # docker-compose 서비스 이름
      port: 6379

kis:
  app-key: ${KIS_APP_KEY:}
  app-secret: ${KIS_APP_SECRET:}
  mock-base-url: https://openapivts.koreainvestment.com:29443
  real-base-url: https://openapi.koreainvestment.com:9443

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}

encrypt:
  secret-key: ${ENCRYPT_SECRET_KEY}

# Refresh Token 저장소 전환 (db / redis)
# DB vs Redis 성능 비교 시 이 값만 바꾸면 됨
token:
  store: ${TOKEN_STORE:db}  # 기본값: db
