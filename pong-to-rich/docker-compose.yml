services:

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pong-to-rich-app
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILE: prod
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KIS_APP_KEY: ${KIS_APP_KEY}
      KIS_APP_SECRET: ${KIS_APP_SECRET}
      KIS_BASE_URL: ${KIS_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      TOKEN_STORE: ${TOKEN_STORE:-db}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pong-network

  mysql:
    image: mysql:8.0
    container_name: pong-to-rich-mysql
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Seoul
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pong-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Promtail — pong-to-rich-app 컨테이너 로그를 읽어서 monitoring-server Loki로 전송
  # Loki가 monitoring-server에 있어서 같은 docker-compose 네트워크로 접근 불가
  # → LOKI_URL 환경변수로 외부 IP 주입 (.env에서 관리)
  promtail:
    image: grafana/promtail:latest
    container_name: pong-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml  # 설정 파일 마운트
      - /var/lib/docker/containers:/var/lib/docker/containers:ro    # Docker 컨테이너 로그 읽기 (읽기 전용)
      - /var/run/docker.sock:/var/run/docker.sock                   # Docker 소켓 (컨테이너 목록 조회용)
    environment:
      LOKI_URL: ${LOKI_URL}  # monitoring-server IP (.env에서 주입)
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true  # 환경변수 치환 활성화
    depends_on:
      - app
    networks:
      - pong-network

  redis:
    image: redis:7-alpine
    container_name: pong-to-rich-redis
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Seoul
    volumes:
      - redis-data:/data
    networks:
      - pong-network
    restart: unless-stopped

  # redis_exporter — Redis 메트릭을 Prometheus가 수집할 수 있도록 노출
  # Prometheus가 이 컨테이너의 /metrics 엔드포인트를 스크랩
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: pong-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - pong-network
    restart: unless-stopped

  # redis:          ← Phase 8 (알림/캐시) 때 추가 → 완료
  # kafka:          ← Phase 16 (Kafka) 때 추가
  # elasticsearch:  ← Phase 16 (ES) 때 추가

  # prometheus, grafana, loki → monitoring-server VM에서 별도 docker-compose로 실행
  # monitoring/docker-compose.yml 참고

networks:
  pong-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
