name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  # ── Job 1: 변경된 경로 감지 ──────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'pong-to-rich/backend/**'
              - 'pong-to-rich/docker-compose.yml'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'pong-to-rich/frontend/**'
              - '.github/workflows/deploy.yml'

  # ── Job 2: 백엔드 빌드 & 테스트 ──────────────────────────────────
  build-backend:
    name: Build & Test (Backend)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('pong-to-rich/backend/build.gradle') }}
          restore-keys: gradle-

      - name: Gradle 실행 권한 부여
        working-directory: pong-to-rich/backend
        run: chmod +x gradlew

      - name: 빌드 & 테스트
        working-directory: pong-to-rich/backend
        run: ./gradlew build -x test

  # ── Job 3: 백엔드 배포 ───────────────────────────────────────────
  deploy-backend:
    name: Deploy (Backend)
    runs-on: self-hosted
    needs: build-backend

    steps:
      - name: 최신 코드 pull
        working-directory: /home/ubuntu/Backend-A-to-Z
        run: git pull origin main

      - name: Docker 이미지 재빌드 & 컨테이너 재시작
        working-directory: /home/ubuntu/Backend-A-to-Z/pong-to-rich
        run: |
          docker compose up --build -d
          docker image prune -f

      - name: 헬스체크 (컨테이너 기동 대기)
        run: |
          echo "컨테이너 기동 대기 중..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health --max-time 5 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "헬스체크 성공"
              exit 0
            fi
            echo "대기 중... ($i/12, HTTP $STATUS)"
            sleep 10
          done
          echo "헬스체크 실패 — 컨테이너 로그 확인"
          docker logs pong-to-rich-app --tail 50
          exit 1

  # ── Job 4: 프론트엔드 배포 ──────────────────────────────────────
  deploy-frontend:
    name: Deploy (Frontend)
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: 최신 코드 pull
        working-directory: /home/ubuntu/Backend-A-to-Z
        run: git pull origin main

      - name: 프론트엔드 Docker 이미지 재빌드 & 컨테이너 재시작
        working-directory: /home/ubuntu/Backend-A-to-Z/pong-to-rich/frontend
        run: |
          docker compose up --build -d
          docker image prune -f
